spring:
  application:
    name: backend

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}

jwt:
  secret:
    key: ${SECRET_KEY}

webclient:
  payment:
    baseurl: ${PAYMENT_WEBCLIENT_BASEURL}

iamport:
  secret: ${IAMPORT_SECRET}
  api:
    key: ${IAMPORT_API_KEY}
